<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>COP4331 Contact Management Page</title>

  <link href="css/styles.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <h1>COP4331 Contact Manager</h1>

    <div class="content">
      <!-- Add Contact -->
      <div class="form-container">
        <h2>Add Contact</h2>

        <form id="contact-form" onsubmit="return false;">
          <sub>Name</sub><br>
          <input type="text" id="contactName" placeholder="John Doe" required>

          <br><sub>Phone Number</sub><br>
          <input type="text" id="contactPhone" placeholder="(xxx)-xxx-xxxx" required>

          <br><sub>Email</sub><br>
          <input type="email" id="contactEmail" placeholder="email@example.com" required>

          <div>
            <button type="button" onclick="addContact();">Add</button>
          </div>

          <div id="contactAddResult"></div>
        </form>
      </div>

      <!-- Contact List -->
      <div class="contacts-container">
        <h2>Contact List</h2>

        <input type="text" id="searchText" placeholder="Search Contact">
        <div id="contactSearchResult"></div>

        <div class="table-container">
          <table id="contacts-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Actions</th>
              </tr>
            </thead>

            <tbody id="contactsBody">
              <!-- rows injected by contacts.js -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <span id="userName"></span><br />
    <button type="button" id="logoutButton" class="buttons" onclick="doLogout();">Log Out</button>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/contacts.js"></script>
  <script>
    initContactsPage();
  </script>
</body>
</html>
