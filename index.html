<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>COP4331 Log-In or Sign Up Page</title>

  <link href="css/start_styles.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <h1>COP4331 Log-In or Sign Up Page</h1>

    <div class="content">
      <!-- Login -->
      <div class="login-container">
        <h2>Log In</h2>

        <form id="login-form" onsubmit="return false;">
          <sub>Username</sub><br>
          <input type="text" id="loginName" placeholder="Username" required>

          <br><sub>Password</sub><br>
          <input type="password" id="loginPassword" placeholder="Password" required>

          <div>
            <button type="button" onclick="doLogin();">Log In</button>
          </div>

          <div id="loginResult"></div>
        </form>
      </div>

      <!-- Sign Up -->
      <div class="signup-container">
        <h2>Sign Up</h2>

        <form id="signup-form" onsubmit="return false;">
          <sub>First Name</sub><br>
          <input type="text" id="signupFirstName" placeholder="First Name" required>

          <br><sub>Last Name</sub><br>
          <input type="text" id="signupLastName" placeholder="Last Name" required>

          <br><sub>Username</sub><br>
          <input type="text" id="signupLogin" placeholder="Username" required>

          <br><sub>Password</sub><br>
          <input type="password" id="signupPassword" placeholder="Password" required>

          <div>
            <button type="button" onclick="doSignUp();">Sign Up</button>
          </div>

          <div id="signupResult"></div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/md5.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
